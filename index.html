<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idul Fitri 2026</title>
    <style>
        :root {
            --primary: #064e3b;
            --accent: #d4af37;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #022c22;
            background-image: radial-gradient(circle at center, rgba(6, 78, 59, 0.4) 0%, #022c22 100%);
            touch-action: manipulation;
        }

        /* LAMPION */
        body::before, body::after {
            content: "🏮";
            position: absolute; top: -10px; font-size: 50px;
            animation: swing 3s ease-in-out infinite alternate;
            z-index: 20;
        }
        body::before { left: 10%; transform-origin: top; }
        body::after { right: 10%; transform-origin: top; }
        @keyframes swing { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }

        /* WRAPPER AMPLOP */
        .wrapper {
            position: relative;
            width: 90%; max-width: 380px; 
            aspect-ratio: 3 / 2; 
            perspective: 1000px;
            cursor: pointer;
            z-index: 10;
        }

        .envelope {
            position: absolute; width: 100%; height: 100%;
            background: var(--primary);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 3; /* Di atas kartu saat tertutup */
        }

        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 45vw solid transparent; 
            border-right: 45vw solid transparent;
            border-top: 30vw solid #086d51;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 6; /* Paling depan saat tertutup */
        }

        @media (min-width: 420px) {
            .flap {
                border-left: 190px solid transparent;
                border-right: 190px solid transparent;
                border-top: 130px solid #086d51;
            }
        }

        .pocket {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: var(--primary);
            clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
            z-index: 5; /* Di depan kartu agar kartu terlihat keluar dari dalam */
            border-radius: 0 0 15px 15px;
        }

        /* KARTU UCAPAN (PERBAIKAN DISINI) */
        .card {
            position: absolute; 
            top: 5%; left: 5%;
            width: 90%; height: 90%;
            background: var(--white);
            border-radius: 10px;
            z-index: 4; /* Diantara envelope dan pocket */
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; box-sizing: border-box;
            text-align: center;
            opacity: 0; /* Sembunyi total saat tertutup */
            transform: translateY(0);
            pointer-events: none;
        }

        .card img {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 10px;
            pointer-events: none; /* Anti Download */
            -webkit-user-drag: none;
        }

        .card h1 { color: var(--primary); margin: 0; font-size: 18px; }
        .card h2 { color: var(--accent); margin: 5px 0; font-size: 15px; }
        .card p { font-size: 11px; color: #444; line-height: 1.5; margin: 10px 0; }
        .closing { font-weight: bold; color: var(--primary); font-size: 13px; margin-top: auto; }

        /* ANIMASI SAAT DIBUKA */
        .wrapper.open .flap { 
            transform: rotateX(180deg); 
            z-index: 1; 
        }

        .wrapper.open .card {
            opacity: 1; /* Muncul saat dibuka */
            transform: translateY(-65%); /* Naik ke atas */
            height: 160%;
            z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            pointer-events: all;
        }

        .hint { 
            position: absolute; bottom: -50px; width: 100%; text-align: center; 
            color: var(--accent); font-size: 13px; font-weight: bold;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .firework-particle {
            position: fixed; width: 4px; height: 4px; border-radius: 50%;
            z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="lebaranMusic" loop>
        <source src="takbiran.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper" id="mainWrapper">
        <div class="flap"></div>
        <div class="envelope"></div>
        
        <div class="card">
            <img src="FOTO_KAMU.jpg" alt="Profile">
            <h1>Selamat Idul Fitri</h1>
            <h2>1447 Hijriah</h2>
            <p>
                Taqabbalallahu Minna Wa Minkum.<br>
                Semoga di hari yang suci ini, kita diberkahi kesehatan dan kebahagiaan hati.<br>
                Mohon Maaf Lahir & Batin.
            </p>
            <p class="closing">✨ Muhammad Afrizal ✨</p>
        </div>

        <div class="pocket"></div>
        <div class="hint">TAP UNTUK MEMBUKA ✉️</div>
    </div>

    <script>
        const wrapper = document.getElementById('mainWrapper');
        const audio = document.getElementById('lebaranMusic');
        let isOpen = false;

        wrapper.addEventListener('click', () => {
            wrapper.classList.toggle('open');
            isOpen = !isOpen;
            if (isOpen) {
                audio.play().catch(() => {});
                for(let i=0; i<3; i++) setTimeout(launchFirework, i*300);
            } else {
                audio.pause();
                audio.currentTime = 0;
            }
        });

        function launchFirework() {
            const colors = ['#d4af37', '#ffd700', '#ffffff', '#059669'];
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = '50%'; p.style.top = '50%';
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 180 + 50;
                const x = Math.cos(angle) * dist;
                const y = Math.sin(angle) * dist;

                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${x}px,${y}px) scale(0)`, opacity: 0 }
                ], { duration: 1200 + Math.random()*500 }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
