<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idul Fitri 2026 - Masterpiece</title>
    <style>
        :root {
            --primary: #064e3b;
            --accent: #d4af37;
            --white: #ffffff;
        }

        /* 1. BACKGROUND & LAYOUT RESPONSIVE */
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #022c22;
            background-image: 
                radial-gradient(circle at center, rgba(6, 78, 59, 0.4) 0%, #022c22 100%),
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l3 10 10 3-10 3-3 10-3-10-10-3 10-3 3-10z' fill='%23d4af37' fill-opacity='0.15'/%3E%3C/svg%3E");
            background-size: cover, 60px 60px;
            touch-action: manipulation;
        }

        /* 2. EFEK LAMPION (KEMBALI LAGI!) */
        body::before, body::after {
            content: "🏮";
            position: absolute;
            top: -10px;
            font-size: 30px; /* Ukuran pas di HP */
            animation: swing 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 10px var(--accent));
            z-index: 5;
        }
        body::before { left: 10%; transform-origin: top; }
        body::after { right: 10%; transform-origin: top; }

        @keyframes swing {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

        /* 3. WRAPPER AMPLOP RESPONSIVE */
        .wrapper {
            position: relative;
            width: 90%; 
            max-width: 450px; 
            aspect-ratio: 3 / 2; 
            perspective: 2000px;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            background: var(--primary);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Flap dinamis di HP */
        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 45vw solid transparent; 
            border-right: 45vw solid transparent;
            border-top: 30vw solid #086d51;
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 4;
        }

        /* Batas flap untuk layar lebar/desktop */
        @media (min-width: 500px) {
            .flap {
                border-left: 225px solid transparent;
                border-right: 225px solid transparent;
                border-top: 150px solid #086d51;
            }
        }

        .pocket {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: var(--primary);
            clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
            z-index: 3;
            border-radius: 0 0 15px 15px;
        }

        /* 4. KARTU UCAPAN (FONT & UKURAN HP-FRIENDLY) */
        .card {
            position: absolute; top: 10%; left: 5%;
            width: 90%; height: 85%;
            background: var(--white);
            border-radius: 10px;
            z-index: 2;
            transition: all 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; box-sizing: border-box;
            text-align: center;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .card img {
            width: 70px; height: 70px; /* Ukuran pas di HP */
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 10px;
        }

        /* Judul Selamat */
        .card h1 { 
            color: var(--primary); 
            margin: 0; 
            font-size: 20px; 
            font-weight: bold;
        }
        
        /* Judul Hijriah */
        .card h2 { 
            color: var(--accent); 
            margin: 5px 0 0 0; 
            font-size: 16px; 
            font-weight: bold;
        }

        /* Isi Ucapan */
        .card p { 
            font-size: 12px; 
            color: #444; 
            margin-top: 15px; 
            line-height: 1.4; 
            max-width: 95%;
        }

        /* Nama Penutup */
        .closing-name {
            font-weight: bold; 
            color: var(--primary); 
            margin-top: 20px; 
            font-size: 14px;
        }

        /* 5. SAAT AMPLOP DIBUKA */
        .wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }
        .wrapper.open .card {
            transform: translateY(-55%);
            height: 180%;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding-top: 30px;
        }

        /* Tombol Hint */
        .hint { 
            position: absolute; bottom: -50px; width: 100%; text-align: center; 
            color: var(--accent); font-weight: bold; font-size: 14px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* CSS Partikel Kembang Api */
        .firework-particle {
            position: fixed;
            width: 5px; height: 5px;
            border-radius: 50%;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <audio id="lebaranMusic" loop>
        <source src="takbiran.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper" id="mainWrapper">
        <div class="flap"></div>
        <div class="envelope"></div>
        <div class="card">
            <img src="FOTO_KAMU.jpg" alt="Foto Kamu">
            
            <h1>Selamat Idul Fitri</h1>
            <h2>1447 Hijriah</h2>
            
            <p>
                Taqabbalallahu Minna Wa Minkum.<br>
                Semoga di tahun ini kita diberkahi kebahagiaan, kesehatan, dan hati yang kembali suci.
                Mohon Maaf Lahir & Batin.
            </p>
            
            <p class="closing-name">Rizal & Keluarga ✨</p>
        </div>
        <div class="pocket"></div>
        <div class="hint">KLIK AMPLOP UNTUK MEMBUKA ✨</div>
    </div>

    <script>
        const wrapper = document.getElementById('mainWrapper');
        const audio = document.getElementById('lebaranMusic');
        let isOpen = false;

        wrapper.addEventListener('click', () => {
            wrapper.classList.toggle('open');
            isOpen = !isOpen;

            if (isOpen) {
                // Musik Berputar (setelah klik di HP)
                audio.play().catch(e => console.log("Audio play blocked."));
                
                // JALANKAN KEMBANG API (Burst Effect)
                // Titik ledakan dari posisi amplop (tengah layar)
                launchFirework();
                setTimeout(launchFirework, 250);
                setTimeout(launchFirework, 500);
                
            } else {
                audio.pause();
                audio.currentTime = 0;
            }
        });

        // JAVASCRIPT KEMBANG API (EMAS & WARNA-WARNI)
        function launchFirework() {
            // Kombinasi warna emas, hijau, putih
            const colors = ['#d4af37', '#ffd700', '#059669', '#ffffff', '#fbbf24'];
            const particleCount = 40;
            
            // Titik ledakan (tengah layar)
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                
                // Set warna acak
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Set posisi awal (ledakan dari tengah)
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                // Memberikan efek cahaya berpendar
                particle.style.boxShadow = `0 0 10px ${particle.style.backgroundColor}`;
                
                document.body.appendChild(particle);

                // Menghitung arah ledakan acak (360 derajat)
                const angle = Math.random() * Math.PI * 2;
                // Kekuatan ledakan acak
                const velocity = Math.random() * 150 + 50; 
                // Menghitung koordinat tujuan ledakan
                const destinationX = Math.cos(angle) * velocity * 1.5;
                const destinationY = Math.sin(angle) * velocity * 1.5;

                const animation = particle.animate([
                    { 
                        // Posisi awal: Tengah, ukuran normal, muncul
                        transform: 'translate(0, 0) scale(1)', 
                        opacity: 1 
                    },
                    { 
                        // Posisi akhir: Menyebar, ukuran mengecil, menghilang
                        transform: `translate(${destinationX}px, ${destinationY}px) scale(0)`, 
                        opacity: 0 
                    }
                ], {
                    // Durasi acak agar terlihat alami
                    duration: 1200 + Math.random() * 800,
                    easing: 'cubic-bezier(0, .9, .57, 1)' // Efek melambat di akhir
                });

                // Hapus partikel dari DOM setelah animasi selesai
                animation.onfinish = () => particle.remove();
            }
        }
    </script>
</body>
</html>
