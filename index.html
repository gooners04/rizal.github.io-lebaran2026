<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idul Fitri 2026 - Masterpiece</title>
    <style>
        :root {
            --primary: #064e3b;
            --accent: #d4af37;
            --white: #ffffff;
        }

        /* 1. LAYOUT UTAMA */
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #022c22;
            background-image: radial-gradient(circle at center, rgba(6, 78, 59, 0.4) 0%, #022c22 100%);
            touch-action: manipulation;
        }

        /* 2. LAMPION */
        body::before, body::after {
            content: "🏮";
            position: absolute; top: -10px; font-size: 30px;
            animation: swing 3s ease-in-out infinite alternate;
            z-index: 5;
        }
        body::before { left: 10%; transform-origin: top; }
        body::after { right: 10%; transform-origin: top; }
        @keyframes swing { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }

        /* 3. WRAPPER AMPLOP */
        .wrapper {
            position: relative;
            width: 90%; max-width: 400px; 
            aspect-ratio: 3 / 2; 
            perspective: 1000px;
            cursor: pointer;
            z-index: 10;
        }

        .envelope {
            position: relative; width: 100%; height: 100%;
            background: var(--primary);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 45vw solid transparent; 
            border-right: 45vw solid transparent;
            border-top: 30vw solid #086d51;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 4;
        }

        @media (min-width: 450px) {
            .flap {
                border-left: 200px solid transparent;
                border-right: 200px solid transparent;
                border-top: 135px solid #086d51;
            }
        }

        .pocket {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: var(--primary);
            clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
            z-index: 3;
            border-radius: 0 0 15px 15px;
        }

        /* 4. KARTU & PROTEKSI FOTO */
        .card {
            position: absolute; top: 10%; left: 5%;
            width: 90%; height: 85%;
            background: var(--white);
            border-radius: 10px;
            z-index: 2;
            transition: all 0.8s ease;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; box-sizing: border-box;
            text-align: center;
            -webkit-user-select: none; user-select: none; /* Anti Copy Teks */
        }

        .card img {
            width: 75px; height: 75px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 10px;
            /* PROTEKSI FOTO KERAS */
            pointer-events: none; 
            -webkit-user-drag: none;
            touch-action: none;
        }

        .card h1 { color: var(--primary); margin: 0; font-size: 18px; }
        .card h2 { color: var(--accent); margin: 5px 0; font-size: 16px; }
        .card p { font-size: 12px; color: #444; line-height: 1.4; }
        .closing { font-weight: bold; color: var(--primary); margin-top: 10px; font-size: 13px; }

        /* 5. ANIMASI BUKA */
        .wrapper.open .flap { transform: rotateX(180deg); z-index: 1; }
        .wrapper.open .card {
            transform: translateY(-60%);
            height: 180%;
            z-index: 5;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .hint { 
            position: absolute; bottom: -40px; width: 100%; text-align: center; 
            color: var(--accent); font-size: 12px; font-weight: bold;
        }

        .firework-particle {
            position: fixed; width: 4px; height: 4px; border-radius: 50%;
            z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;"> <!-- Lock Klik Kanan -->

    <audio id="lebaranMusic" loop>
        <source src="takbiran.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper" id="mainWrapper">
        <div class="flap"></div>
        <div class="envelope"></div>
        <div class="card">
            <!-- Ganti nama file foto disini -->
            <img src="FOTO_KAMU.jpg" alt="Profile">
            <h1>Selamat Idul Fitri</h1>
            <h2>1447 Hijriah</h2>
            <p>Taqabbalallahu Minna Wa Minkum.<br>Mohon Maaf Lahir & Batin.<br>Semoga keberkahan menyertai kita semua.</p>
            <p class="closing">✨ Muhammad Afrizal ✨</p>
        </div>
        <div class="pocket"></div>
        <div class="hint">KLIK AMPLOP UNTUK MEMBUKA ✉️</div>
    </div>

    <script>
        const wrapper = document.getElementById('mainWrapper');
        const audio = document.getElementById('lebaranMusic');
        let isOpen = false;

        wrapper.addEventListener('click', () => {
            wrapper.classList.toggle('open');
            isOpen = !isOpen;
            if (isOpen) {
                audio.play().catch(() => {});
                for(let i=0; i<3; i++) setTimeout(launchFirework, i*300);
            } else {
                audio.pause();
                audio.currentTime = 0;
            }
        });

        function launchFirework() {
            const colors = ['#d4af37', '#ffd700', '#ffffff', '#059669'];
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = '50%'; p.style.top = '50%';
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                const x = Math.cos(angle) * dist;
                const y = Math.sin(angle) * dist;

                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${x}px,${y}px) scale(0)`, opacity: 0 }
                ], { duration: 1000 + Math.random()*500 }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
